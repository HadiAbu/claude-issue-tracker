name: CD - Deploy to EC2

on:
  workflow_run:
    workflows: ["CI - Build and Push"] # 👈 Must match the 'name' of your first file exactly
    types:
      - completed # 👈 Triggers when the build workflow finishes

env:
  REGISTRY: ghcr.io
  API_IMAGE_NAME: hadiabu/claude-issue-tracker-api
  WEB_IMAGE_NAME: hadiabu/claude-issue-tracker-web

jobs:
  deploy-to-server:
    runs-on: ubuntu-latest
    # ⚠️ CRITICAL: This conditional guarantees it ONLY runs if the build actually succeeded!
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: Get GitHub Runner Public IP
        id: ip
        run: echo "ipv4=$(curl -s https://api.ipify.org)" >> $GITHUB_OUTPUT

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1 # 👈 Change to your actual AWS region

      - name: Open Port 22 in AWS Security Group
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.AWS_SECURITY_GROUP_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.ip.outputs.ipv4 }}/32

      - name: Execute remote SSH commands to deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: REGISTRY,API_IMAGE_NAME,WEB_IMAGE_NAME,GHCR_TOKEN,GITHUB_ACTOR
          script: |
            cd /home/${{ secrets.EC2_USERNAME }}/projects/claude-issue-tracker && git pull && docker compose -f docker-compose.prod.yml up -d

      - name: Close Port 22 in AWS Security Group (Always Runs)
        if: always() # 👈 Guarantees the door shuts even if the deploy steps fail
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.AWS_SECURITY_GROUP_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.ip.outputs.ipv4 }}/32