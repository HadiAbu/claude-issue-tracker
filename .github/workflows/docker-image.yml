name: CI - Build and Push

on:
  push:
    branches: [ "master" ]

env:
  REGISTRY: ghcr.io
  API_IMAGE_NAME: hadiabu/claude-issue-tracker-api
  WEB_IMAGE_NAME: hadiabu/claude-issue-tracker-web

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Lowercase repo name
        uses: ASzc/change-string-case-action@v6
        id: lowercase
        with:
          string: ghcr.io/hadiabu/claude-issue-tracker
          
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build API Image
      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}:latest

      # Build Web Image
      - name: Build and push Web
        uses: docker/build-push-action@v5
        with:
          context: ./web
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.WEB_IMAGE_NAME }}:latest
          build-args: |
            VITE_API_URL=http://13.61.24.112:8000
